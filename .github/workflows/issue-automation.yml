name: Issue Management Automation
on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Triage Issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = issue.body ? issue.body.toLowerCase() : '';
            const repo = context.repo;

            // Initialize labels to add
            let labelsToAdd = ['needs-triage'];

            // Add category labels based on title
            if (title.includes('bug')) {
              labelsToAdd.push('bug');
            }
            if (title.includes('epic')) {
              labelsToAdd.push('epic');
            }
            if (title.includes('maintenance')) {
              labelsToAdd.push('maintenance');
            }

            // Determine priority label
            let priorityLabel = 'priority-medium';
            const criticalKeywords = ['critical', 'urgent', 'production', 'outage'];
            const highKeywords = ['important', 'high', 'blocking'];
            const lowKeywords = ['low', 'nice-to-have', 'minor'];

            if (criticalKeywords.some(word => title.includes(word) || body.includes(word))) {
              priorityLabel = 'priority-critical';
            } else if (highKeywords.some(word => title.includes(word) || body.includes(word))) {
              priorityLabel = 'priority-high';
            } else if (lowKeywords.some(word => title.includes(word) || body.includes(word))) {
              priorityLabel = 'priority-low';
            }
            labelsToAdd.push(priorityLabel);

            // Create missing required labels
            const requiredLabels = [
              // Category Labels
              {name: 'bug', description: 'Something isn\'t working'},
              {name: 'enhancement', description: 'New feature or request'},
              {name: 'epic', description: 'Large feature requiring multiple sub-tasks'},
              {name: 'maintenance', description: 'Maintenance and housekeeping tasks'},
              // Priority Labels
              {name: 'priority-critical', description: 'Critical priority issue'},
              {name: 'priority-high', description: 'High priority issue'},
              {name: 'priority-medium', description: 'Medium priority issue'},
              {name: 'priority-low', description: 'Low priority issue'},
              // Status Labels
              {name: 'needs-triage', description: 'Needs to be reviewed by maintainers'},
              {name: 'needs-review', description: 'Awaiting review from maintainers'},
              {name: 'first-time-contributor', description: 'Issue created by first-time contributor'}
            ];

            for (const label of requiredLabels) {
              try {
                await github.rest.issues.getLabel({
                  ...repo,
                  name: label.name
                });
              } catch (err) {
                if (err.status === 404) {
                  await github.rest.issues.createLabel({
                    ...repo,
                    name: label.name,
                    description: label.description,
                    color: 'ffffff'
                  });
                }
              }
            }

            // Add labels to the issue
            await github.rest.issues.addLabels({
              ...repo,
              issue_number: issue.number,
              labels: labelsToAdd
            });

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: ${{ contains(github.event.issue.labels.*.name, 'epic') }}
    steps:
      - name: Create Epic Subtasks
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const repo = context.repo;
            const parentNumber = issue.number;
            const originalTitle = issue.title;

            // Define subtasks
            const subtasks = [
              {num: 1, name: 'Requirements Analysis'},
              {num: 2, name: 'Design and Architecture'},
              {num: 3, name: 'Implementation'},
              {num: 4, name: 'Testing and Documentation'}
            ];

            // Create each subtask and track their numbers
            const subtaskNumbers = [];
            for (const task of subtasks) {
              const subtaskTitle = `[SUBTASK] ${originalTitle} - Task ${task.num}: ${task.name}`;
              const subtaskBody = `Related to #${parentNumber}`;

              const createdSubtask = await github.rest.issues.create({
                ...repo,
                title: subtaskTitle,
                body: subtaskBody,
                labels: ['enhancement', 'needs-review']
              });

              subtaskNumbers.push(createdSubtask.data.number);
            }

            // Update parent issue with Epic Tasks checklist
            const checklist = subtaskNumbers.map(num => `- [ ] #${num}`).join('\n');
            const updatedBody = `${issue.body || ''}\n\n## Epic Tasks\n${checklist}`;

            await github.rest.issues.update({
              ...repo,
              issue_number: parentNumber,
              body: updatedBody
            });

  auto-response:
    runs-on: ubuntu-latest
    needs: [issue-triage, task-breakdown]
    if: ${{ always() }}
    steps:
      - name: Handle Auto-Response and Updates
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const repo = context.repo;
            const issueNumber = issue.number;
            const author = issue.user.login;

            // Check if this is the author's first issue in the repo
            let isFirstIssue = false;
            try {
              const authorIssues = await github.rest.search.issuesAndPullRequests({
                q: `is:issue author:${author} repo:${repo.owner}/${repo.repo}`,
                per_page: 2
              });
              isFirstIssue = authorIssues.data.total_count === 1;
            } catch (err) {
              console.log('Error checking first issue status:', err);
            }

            // Add first-time-contributor label if applicable
            if (isFirstIssue) {
              await github.rest.issues.addLabels({
                ...repo,
                issue_number: issueNumber,
                labels: ['first-time-contributor']
              });
            }

            // Determine response message based on issue type
            const issueLabels = issue.labels.map(l => l.name);
            let responseMessage = '';

            if (issueLabels.includes('bug')) {
              responseMessage = 'Thank you for reporting this bug! Please refer to our [Bug Report Guidelines](.github/ISSUE_TEMPLATE/bug_report.md) for more details.';
            } else if (issueLabels.includes('epic')) {
              responseMessage = 'Thank you for submitting this epic! Please refer to our [Feature Request Process](.github/ISSUE_TEMPLATE/feature_request.md) for more details.';
            } else if (issueLabels.includes('maintenance')) {
              responseMessage = 'Thank you for submitting this maintenance task! Please refer to our [Maintenance Guidelines](.github/ISSUE_TEMPLATE/maintenance_report.md) for more details.';
            }

            // Add welcome message for first-time contributors
            if (isFirstIssue) {
              responseMessage = `Welcome to the project! This is your first issue here. ${responseMessage}`;
            }

            // Post the response comment
            if (responseMessage) {
              await github.rest.issues.createComment({
                ...repo,
                issue_number: issueNumber,
                body: responseMessage
              });
            }

            // Set milestone for high/critical priority issues
            if (issueLabels.includes('priority-high') || issueLabels.includes('priority-critical')) {
              let milestoneId;
              try {
                // Check for existing v1.0.0 milestone
                const milestones = await github.rest.issues.listMilestones({
                  ...repo,
                  state: 'open'
                });
                const existingMilestone = milestones.data.find(m => m.title === 'v1.0.0');

                if (existingMilestone) {
                  milestoneId = existingMilestone.number;
                } else {
                  // Create milestone if missing
                  const newMilestone = await github.rest.issues.createMilestone({
                    ...repo,
                    title: 'v1.0.0',
                    state: 'open'
                  });
                  milestoneId = newMilestone.data.number;
                }
              } catch (err) {
                console.log('Error handling milestone:', err);
              }

              if (milestoneId) {
                await github.rest.issues.update({
                  ...repo,
                  issue_number: issueNumber,
                  milestone: milestoneId
                });
              }
            }

            // Update status label from needs-triage to needs-review
            await github.rest.issues.removeLabel({
              ...repo,
              issue_number: issueNumber,
              name: 'needs-triage'
            });
            await github.rest.issues.addLabels({
              ...repo,
              issue_number: issueNumber,
              labels: ['needs-review']
            });
